name: SARIF Demo

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  security-events: write   # REQUIRED

jobs:
  demo-sarif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧪 Generate a sample SARIF file
      - name: Create sample SARIF
        run: |
          mkdir -p reports
          cat <<EOF > reports/sample.sarif
          {
            "\$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "DemoScanner",
                    "informationUri": "https://example.com",
                    "rules": [
                      {
                        "id": "DEMO001",
                        "name": "Hardcoded Secret",
                        "shortDescription": {
                          "text": "Hardcoded secret detected"
                        },
                        "fullDescription": {
                          "text": "This is a demo vulnerability"
                        },
                        "help": {
                          "text": "Remove hardcoded secrets from code"
                        },
                        "defaultConfiguration": {
                          "level": "error"
                        }
                      }
                    ]
                  }
                },
                "results": [
                  {
                    "ruleId": "DEMO001",
                    "level": "error",
                    "message": {
                      "text": "Hardcoded password found"
                    },
                    "locations": [
                      {
                        "physicalLocation": {
                          "artifactLocation": {
                            "uri": "demo.py"
                          },
                          "region": {
                            "startLine": 3,
                            "startColumn": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      # 📄 Create a dummy file referenced in SARIF
      - name: Create demo file
        run: |
          echo "password = 'testing'" > demo.py

      # 🚀 Upload SARIF with category
      - name: Upload SARIF (with category)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/sample.sarif
          category: Secrets Scan